<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>钱包功能测试 - 内嵌网页环境</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .header h1 {
      color: #333;
      margin-bottom: 10px;
    }

    .header p {
      color: #666;
      font-size: 14px;
    }

    .status-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 10px;
    }

    .status-badge.connected {
      background: #52c41a;
      color: white;
    }

    .status-badge.disconnected {
      background: #ff4d4f;
      color: white;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .panel {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .panel h2 {
      color: #333;
      font-size: 18px;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #f0f0f0;
    }

    .status-item {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      margin-bottom: 8px;
      background: #f9f9f9;
      border-radius: 6px;
    }

    .status-item .label {
      color: #666;
      font-weight: 500;
    }

    .status-item .value {
      font-family: 'Courier New', monospace;
      color: #333;
      font-size: 13px;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary {
      background: #1890ff;
      color: white;
    }

    .btn-success {
      background: #52c41a;
      color: white;
    }

    .btn-danger {
      background: #ff4d4f;
      color: white;
    }

    .btn-warning {
      background: #faad14;
      color: white;
    }

    .log-panel {
      background: #1e1e1e;
      border-radius: 6px;
      padding: 15px;
      max-height: 400px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 12px;
    }

    .log-entry {
      padding: 6px 0;
      border-bottom: 1px solid #333;
      color: #ddd;
    }

    .log-entry:last-child {
      border-bottom: none;
    }

    .log-entry .time {
      color: #888;
      margin-right: 10px;
    }

    .log-entry .type {
      margin-right: 10px;
      font-weight: bold;
    }

    .log-entry.info .type {
      color: #1890ff;
    }

    .log-entry.success .type {
      color: #52c41a;
    }

    .log-entry.warning .type {
      color: #faad14;
    }

    .log-entry.error .type {
      color: #ff4d4f;
    }

    .log-empty {
      color: #666;
      text-align: center;
      padding: 20px;
    }

    /* 滚动条样式 */
    .log-panel::-webkit-scrollbar {
      width: 6px;
    }

    .log-panel::-webkit-scrollbar-track {
      background: #333;
      border-radius: 3px;
    }

    .log-panel::-webkit-scrollbar-thumb {
      background: #666;
      border-radius: 3px;
    }

    .log-panel::-webkit-scrollbar-thumb:hover {
      background: #888;
    }

    @media (max-width: 768px) {
      .content-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- 头部 -->
    <div class="header">
      <h1>🔗 钱包功能测试 - 内嵌网页环境</h1>
      <p>测试在 Electron 内嵌窗口中使用 Web3Modal 钱包服务</p>
      <span id="statusBadge" class="status-badge disconnected">未连接</span>
    </div>

    <!-- 内容区域 -->
    <div class="content-grid">
      <!-- 左侧：钱包状态和操作 -->
      <div class="panel">
        <h2>📊 钱包状态</h2>
        <div id="walletStatus">
          <div class="status-item">
            <span class="label">环境检测:</span>
            <span class="value" id="envCheck">检测中...</span>
          </div>
          <div class="status-item">
            <span class="label">钱包服务:</span>
            <span class="value" id="walletService">检测中...</span>
          </div>
          <div class="status-item">
            <span class="label">初始化状态:</span>
            <span class="value" id="initStatus">未初始化</span>
          </div>
          <div class="status-item">
            <span class="label">连接状态:</span>
            <span class="value" id="connectStatus">未连接</span>
          </div>
          <div class="status-item">
            <span class="label">钱包地址:</span>
            <span class="value" id="walletAddress">无</span>
          </div>
          <div class="status-item">
            <span class="label">链ID:</span>
            <span class="value" id="chainId">无</span>
          </div>
        </div>

        <h2 style="margin-top: 20px;">⚡ 钱包操作</h2>
        <div class="button-group">
          <button class="btn-primary" onclick="testInitWallet()">
            初始化钱包
          </button>
          <button class="btn-success" onclick="testConnectWallet()" id="btnConnect">
            连接钱包
          </button>
          <button class="btn-danger" onclick="testDisconnectWallet()" id="btnDisconnect">
            断开钱包
          </button>
          <button class="btn-warning" onclick="testCheckStatus()">
            检查状态
          </button>
          <button class="btn-primary" onclick="testDeployContract()">
            部署 USDT 合约
          </button>
          <button class="btn-success" onclick="testQueryContract()">
            查询合约（USDT余额）
          </button>
          <button class="btn-warning" onclick="testInvokeContract()">
            调用合约（USDT转账）
          </button>
        </div>
      </div>

      <!-- 右侧：日志 -->
      <div class="panel">
        <h2>📝 测试日志</h2>
        <div class="log-panel" id="logPanel">
          <div class="log-empty">等待测试...</div>
        </div>
        <button class="btn-primary" onclick="clearLogs()" style="margin-top: 10px; width: 100%;">
          清空日志
        </button>
      </div>
    </div>
  </div>

    // ==================== 日志系统 ====================
    const logs = [];

    function addLog(message, type = 'info') {
      const time = new Date().toLocaleTimeString();
      logs.push({ time, type, message });

      // 控制台输出
      const prefix = `[Wallet Test ${type.toUpperCase()}]`;
      console.log(prefix, message);

      // 更新 UI
      updateLogPanel();
    }

    function updateLogPanel() {
      const panel = document.getElementById('logPanel');

      if (logs.length === 0) {
        panel.innerHTML = '<div class="log-empty">暂无日志</div>';
        return;
      }

      panel.innerHTML = logs.map(log => `
        <div class="log-entry ${log.type}">
          <span class="time">${log.time}</span>
          <span class="type">${getLogIcon(log.type)}</span>
          <span class="message">${log.message}</span>
        </div>
      `).reverse().join('');

      // 滚动到底部
      panel.scrollTop = panel.scrollHeight;
    }

    function getLogIcon(type) {
      const icons = {
        info: 'ℹ️',
        success: '✅',
        warning: '⚠️',
        error: '❌'
      };
      return icons[type] || 'ℹ️';
    }

    function clearLogs() {
      logs.length = 0;
      updateLogPanel();
      addLog('日志已清空', 'info');
    }

    // ==================== 状态更新 ====================
    function updateStatus(key, value, isSuccess = null) {
      const element = document.getElementById(key);
      if (element) {
        element.textContent = value;
        if (isSuccess !== null) {
          element.style.color = isSuccess ? '#52c41a' : '#ff4d4f';
        }
      }
    }

    function updateConnectionBadge(isConnected) {
      const badge = document.getElementById('statusBadge');
      if (isConnected) {
        badge.textContent = '已连接';
        badge.className = 'status-badge connected';
      } else {
        badge.textContent = '未连接';
        badge.className = 'status-badge disconnected';
      }
    }

    // ==================== 环境检测 ====================
    async function detectEnvironment() {
      addLog('========== 开始环境检测 ==========', 'info');

      // 检测 1: 是否在 Electron 环境
      const isElectron = typeof window !== 'undefined' &&
        typeof window.process === 'object' &&
        window.process.type === 'renderer';

      addLog(`Electron 环境: ${isElectron ? '是' : '否'}`, isElectron ? 'success' : 'warning');
      updateStatus('envCheck', isElectron ? '✅ Electron' : '❌ 非 Electron', isElectron);

      // 检测 2: 是否有 ipc
      const hasIpc = typeof window.ipc !== 'undefined';
      addLog(`IPC 可用: ${hasIpc ? '是' : '否'}`, hasIpc ? 'success' : 'warning');

      // 检测 3: URL 参数
      const urlParams = new URLSearchParams(window.location.search);
      const walletParam = urlParams.get('wallet');
      addLog(`URL wallet 参数: ${walletParam || '无'}`, walletParam ? 'success' : 'info');

      // 检测 4: 钱包服务
      await detectWalletService();

      addLog('========== 环境检测完成 ==========', 'success');
    }

    async function detectWalletService() {
      addLog('检测钱包服务...', 'info');

      try {
        // 方式 1: 通过 window.wallet
        if (typeof window.wallet !== 'undefined') {
          addLog('✅ 找到 window.wallet', 'success');
          updateStatus('walletService', '✅ 可用 (window.wallet)', true);
          return true;
        }

        // 方式 2: 通过 IPC 请求
        if (typeof window.ipc !== 'undefined') {
          addLog('尝试通过 IPC 获取钱包服务...', 'info');
          // 这里需要主进程支持
          updateStatus('walletService', '⚠️ 需要 IPC 支持', null);
          return false;
        }

        // 方式 3: 通过 WalletClient
        addLog('⚠️ 未找到直接钱包服务，需要使用 WalletClient', 'warning');
        updateStatus('walletService', '⚠️ 需要桥接', null);
        return false;

      } catch (e) {
        addLog(`❌ 检测失败: ${e.message}`, 'error');
        updateStatus('walletService', '❌ 不可用', false);
        return false;
      }
    }

    // ==================== 钱包操作 ====================
    async function testInitWallet() {
      addLog('========== 测试: 初始化钱包 ==========', 'info');

      try {
        // 检查钱包服务
        if (typeof window.wallet === 'undefined') {
          throw new Error('钱包服务不可用');
        }

        addLog('调用 wallet.initWallet()...', 'info');
        await window.wallet.initWallet();

        addLog('✅ 钱包初始化成功', 'success');
        updateStatus('initStatus', '✅ 已初始化', true);

        // 更新状态
        await updateWalletStatus();

      } catch (e) {
        addLog(`❌ 初始化失败: ${e.message}`, 'error');
        updateStatus('initStatus', '❌ 失败', false);
      }
    }

    async function testConnectWallet() {
      addLog('========== 测试: 连接钱包 ==========', 'info');

      try {
        // 检查钱包服务
        if (typeof window.wallet === 'undefined') {
          throw new Error('钱包服务不可用');
        }

        // 检查是否已初始化
        if (!window.wallet.checkInitialized()) {
          addLog('钱包未初始化，先初始化...', 'warning');
          await window.wallet.initWallet();
        }

        addLog('打开钱包连接对话框...', 'info');
        const result = await window.wallet.openWallet();

        console.log('[Test Page] openWallet 结果:', result);

        if (result && result.success) {
          addLog(`✅ 连接成功`, 'success');
          addLog(`地址: ${result.address}`, 'info');
          addLog(`链ID: ${result.chainId}`, 'info');

          updateStatus('connectStatus', '✅ 已连接', true);
          updateStatus('walletAddress', result.address ? `${result.address.slice(0, 6)}...${result.address.slice(-4)}` : '无', null);
          updateStatus('chainId', result.chainId || '无', null);
          updateConnectionBadge(true);
        } else {
          addLog('⚠️ 用户取消连接或连接超时', 'warning');
          addLog(`错误: ${result?.error || '未知错误'}`, 'error');
        }

      } catch (e) {
        addLog(`❌ 连接失败: ${e.message}`, 'error');
        updateStatus('connectStatus', '❌ 失败', false);
      }
    }

    async function testDisconnectWallet() {
      addLog('========== 测试: 断开钱包 ==========', 'info');

      try {
        // 检查钱包服务
        if (typeof window.wallet === 'undefined') {
          throw new Error('钱包服务不可用');
        }

        addLog('调用 wallet.disconnectWallet()...', 'info');
        const success = await window.wallet.disconnectWallet();

        if (success) {
          addLog('✅ 断开成功', 'success');
          updateStatus('connectStatus', '❌ 未连接', false);
          updateStatus('walletAddress', '无', null);
          updateStatus('chainId', '无', null);
          updateConnectionBadge(false);
        } else {
          addLog('⚠️ 断开失败', 'warning');
        }

      } catch (e) {
        addLog(`❌ 断开失败: ${e.message}`, 'error');
      }
    }

    async function testCheckStatus() {
      addLog('========== 测试: 检查状态 ==========', 'info');

      try {
        // 检查钱包服务
        if (typeof window.wallet === 'undefined') {
          throw new Error('钱包服务不可用');
        }

        const status = {
          initialized: window.wallet.checkInitialized(),
          connected: window.wallet.isConnected?.value || false,
          address: window.wallet.address?.value || null,
          chainId: window.wallet.chainId?.value || null
        };

        addLog(`初始化: ${status.initialized}`, 'info');
        addLog(`连接状态: ${status.connected}`, 'info');
        addLog(`地址: ${status.address || '无'}`, 'info');
        addLog(`链ID: ${status.chainId || '无'}`, 'info');

        addLog('✅ 状态检查完成', 'success');

        // 更新 UI
        await updateWalletStatus();

      } catch (e) {
        addLog(`❌ 检查失败: ${e.message}`, 'error');
      }
    }

    async function updateWalletStatus() {
      if (typeof window.wallet === 'undefined') {
        return;
      }

      try {
        // 调用 getWalletState 获取最新状态
        const state = await window.wallet.getWalletState();

        console.log('[Test Page] 钱包状态:', state);

        if (state && state.success) {
          const initialized = state.initialized || false;
          const connected = state.connected || false;
          const address = state.address || null;
          const chainId = state.chainId || null;

          updateStatus('initStatus', initialized ? '✅ 已初始化' : '❌ 未初始化', initialized);
          updateStatus('connectStatus', connected ? '✅ 已连接' : '❌ 未连接', connected);
          updateStatus('walletAddress', address ? `${address.slice(0, 6)}...${address.slice(-4)}` : '无', null);
          updateStatus('chainId', chainId || '无', null);
          updateConnectionBadge(connected);
        }

      } catch (e) {
        console.error('更新状态失败:', e);
      }
    }

    // ==================== 合约测试函数 ====================

    /**
     * 部署 USDT 合约
     */
    async function testDeployContract() {
      addLog('========== 测试部署 USDT 合约 ==========', 'info');

      try {
        if (typeof window.wallet === 'undefined') {
          throw new Error('钱包服务不可用');
        }

        // 检查是否已连接
        const state = await window.wallet.getWalletState();
        if (!state.connected) {
          throw new Error('请先连接钱包');
        }

        const ownerAddress = state.address; // 使用当前钱包地址作为 owner

        addLog(`Owner 地址: ${ownerAddress}`, 'info');
        addLog(`合约名称: Test USDT (固定)`, 'info');
        addLog(`合约符号: TUSDT (固定)`, 'info');
        addLog(`小数位数: 6 (固定)`, 'info');
        addLog(`初始供应量: 1,000,000 TUSDT`, 'info');

        // 用户确认
        const confirmed = confirm(`确认要部署 USDT 测试合约吗？\n\nOwner: ${ownerAddress}\n初始供应: 1,000,000 TUSDT\n\n这将消耗一定的 Gas 费用`);
        if (!confirmed) {
          addLog('❌ 用户取消部署', 'warning');
          return;
        }

        addLog('⏳ 正在部署合约...', 'info');
        addLog('⏳ 等待用户签名...（请在移动端钱包确认）', 'warning');

        // 调用钱包服务部署合约（简化版，只需初始供应量）
        const contractAddress = await window.wallet.deployContract(
          USDT_ABI,
          USDT_BYTECODE,
          ['1000000000000'] // 1,000,000 TUSDT (6位小数)
        );

        addLog(`✅ 合约部署成功！`, 'success');
        addLog(`合约地址: ${contractAddress}`, 'success');
        addLog(`可在 Etherscan 查看: https://goerli.etherscan.io/address/${contractAddress}`, 'info');

        // 保存部署的合约地址
        DEPLOYED_USDT_ADDRESS = contractAddress;

        addLog(`✅ 已保存合约地址，后续查询和转账将使用此地址`, 'success');

        // 5秒后查询一次余额确认
        setTimeout(async () => {
          addLog('⏳ 查询部署者的 USDT 余额...', 'info');
          try {
            const balance = await window.wallet.queryContract(
              contractAddress,
              USDT_ABI,
              'balanceOf',
              [ownerAddress]
            );
            addLog(`✅ 当前余额: ${parseInt(balance) / 1e6} TUSDT`, 'success');
          } catch (e) {
            addLog(`查询余额失败: ${e.message}`, 'warning');
          }
        }, 5000);

      } catch (e) {
        addLog(`❌ 部署失败: ${e.message}`, 'error');
        console.error('部署合约错误:', e);
      }
    }

    /**
     * 查询合约 - USDT 余额
     */
    async function testQueryContract() {
      addLog('========== 测试查询合约 ==========', 'info');

      try {
        if (typeof window.wallet === 'undefined') {
          throw new Error('钱包服务不可用');
        }

        // 检查是否已部署合约
        if (!DEPLOYED_USDT_ADDRESS) {
          throw new Error('请先部署 USDT 合约');
        }

        // 检查是否已连接
        const state = await window.wallet.getWalletState();
        if (!state.connected) {
          throw new Error('请先连接钱包');
        }

        const testAddress = state.address; // 使用当前连接的地址

        addLog(`查询地址: ${testAddress}`, 'info');
        addLog(`合约地址: ${DEPLOYED_USDT_ADDRESS}`, 'info');
        addLog(`调用方法: balanceOf`, 'info');

        // 调用查询合约
        const balance = await window.wallet.queryContract(
          DEPLOYED_USDT_ADDRESS,
          USDT_ABI,
          'balanceOf',
          [testAddress]
        );

        addLog(`✅ 查询成功！余额: ${balance}`, 'success');
        addLog(`余额（格式化）: ${parseInt(balance) / 1e6} TUSDT`, 'success');

      } catch (e) {
        addLog(`❌ 查询失败: ${e.message}`, 'error');
        console.error('查询合约错误:', e);
      }
    }

    /**
     * 调用合约 - USDT 转账
     */
    async function testInvokeContract() {
      addLog('========== 测试调用合约（USDT转账） ==========', 'info');

      try {
        if (typeof window.wallet === 'undefined') {
          throw new Error('钱包服务不可用');
        }

        // 检查是否已部署合约
        if (!DEPLOYED_USDT_ADDRESS) {
          throw new Error('请先部署 USDT 合约');
        }

        // 检查是否已连接
        const state = await window.wallet.getWalletState();
        if (!state.connected) {
          throw new Error('请先连接钱包');
        }

        // 用户确认
        const confirmed = confirm(`确认要转账 10 TUSDT 到测试地址吗？\n\n目标地址: ${TEST_ADDRESS}\n\n这将在移动端钱包弹出签名请求`);
        if (!confirmed) {
          addLog('❌ 用户取消操作', 'warning');
          return;
        }

        addLog(`发送地址: ${state.address}`, 'info');
        addLog(`接收地址: ${TEST_ADDRESS}`, 'info');
        addLog(`转账金额: 10 TUSDT`, 'info');
        addLog(`合约地址: ${DEPLOYED_USDT_ADDRESS}`, 'info');
        addLog('⏳ 正在构造交易...', 'info');

        // 调用合约（需要签名）
        addLog('⏳ 等待用户签名...（请在移动端钱包确认）', 'warning');

        const tx = await window.wallet.invokeContract(
          DEPLOYED_USDT_ADDRESS,
          USDT_ABI,
          'transfer',
          [TEST_ADDRESS, '10000000'] // 10 TUSDT (6位小数)
        );

        addLog(`✅ 交易已发送！`, 'success');
        addLog(`交易哈希: ${tx.hash}`, 'success');
        addLog(`Gas Limit: ${tx.gasLimit}`, 'info');
        addLog(`Gas Price: ${tx.gasPrice}`, 'info');
        addLog(`Nonce: ${tx.nonce}`, 'info');
        addLog(`⏳ 交易已发送，等待确认...（约15-30秒）`, 'warning');
        addLog(`可在 Etherscan 查看: https://goerli.etherscan.io/tx/${tx.hash}`, 'info');

        // 10秒后查询余额
        setTimeout(async () => {
          addLog('⏳ 查询转账后的余额...', 'info');
          try {
            const balance = await window.wallet.queryContract(
              DEPLOYED_USDT_ADDRESS,
              USDT_ABI,
              'balanceOf',
              [state.address]
            );
            addLog(`✅ 当前余额: ${parseInt(balance) / 1e6} TUSDT`, 'success');
          } catch (e) {
            addLog(`查询余额失败: ${e.message}`, 'warning');
          }
        }, 10000);

      } catch (e) {
        addLog(`❌ 调用失败: ${e.message}`, 'error');
        console.error('调用合约错误:', e);
      }
    }

    // ==================== 页面加载 ====================
    window.addEventListener('DOMContentLoaded', async () => {
      addLog('========== 页面加载完成 ==========', 'success');
      addLog(`当前 URL: ${window.location.href}`, 'info');
      addLog(`User Agent: ${navigator.userAgent}`, 'info');

      // 环境检测
      await detectEnvironment();

      // 如果 URL 参数包含 wallet=true，自动初始化
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('wallet') === 'true') {
        addLog('检测到 wallet=true 参数，自动初始化钱包...', 'info');
        setTimeout(() => {
          testInitWallet();
        }, 1000);
      }

      addLog('========== 准备就绪，可以开始测试 ==========', 'success');
    });

    // 监听钱包状态变化
    if (typeof window.wallet !== 'undefined') {
      // 这里可以添加状态监听
      addLog('已设置钱包状态监听', 'info');
    }
  </script>
